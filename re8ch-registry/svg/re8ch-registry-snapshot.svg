    <text x="2" y="222" fill="#526070" font-family="Inter, Arial, sans-serif" font-size="25">A watched entrance for OCI images, Cosign signatures,</text>
    <text x="2" y="258" fill="#526070" font-family="Inter, Arial, sans-serif" font-size="25">SBOMs, scans, and member project isolation.</text>
