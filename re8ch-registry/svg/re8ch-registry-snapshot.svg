<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-labelledby="title desc">
  <title id="title">Re8ch Registry harbor tower snapshot</title>
  <desc id="desc">Product card artwork for Re8ch Registry using a simplified harbor watchtower mark.</desc>
  <rect width="1280" height="720" fill="#f5f7fb"/>
  <rect x="0" y="0" width="1280" height="12" fill="url(#brand)"/>
  <rect x="96" y="92" width="1088" height="536" rx="18" fill="#ffffff" stroke="#d9e0ea" stroke-width="2"/>
  <g transform="translate(150 150) scale(4)">
