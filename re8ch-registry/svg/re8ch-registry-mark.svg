<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="title desc">
  <title id="title">Re8ch Registry Harbor Tower Icon</title>
  <desc id="desc">A compact harbor watchtower icon for Re8ch Registry, with a signal beam and Re8ch brand colors.</desc>
  <style>
    .harbor-beam {
      animation: harbor-beam 3.2s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: left center;
    }

    .harbor-light {
      animation: harbor-light 2.4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    @keyframes harbor-beam {
      0%, 100% { opacity: 0.46; transform: scaleX(0.92); }
      50% { opacity: 0.9; transform: scaleX(1); }
    }

    @keyframes harbor-light {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @media (prefers-reduced-motion: reduce) {
      .harbor-beam,
      .harbor-light {
        animation: none;
      }
    }
  </style>
  <path class="harbor-beam" d="M55 29L86 16V42L55 36Z" fill="#ffd619"/>
  <path d="M23 24L48 11L73 24V32H23Z" fill="#020202"/>
  <path d="M30 25L48 16L66 25V29H30Z" fill="#f81018"/>
  <path d="M30 31H66V50Q66 57 59 57H37Q30 57 30 50Z" fill="#020202"/>
  <path d="M38 36H58V49H38Z" fill="#f8fafc"/>
  <path class="harbor-light" d="M44 39H52V47H44Z" fill="#ffd619"/>
  <path d="M30 56H66L74 78H22Z" fill="#020202"/>
  <path d="M38 58H58L64 74H32Z" fill="#ffffff"/>
  <path d="M28 76H68V84H28Z" fill="#00b559"/>
  <path d="M36 60L60 74M60 60L36 74" stroke="#0a7fbe" stroke-width="5" stroke-linecap="round"/>
</svg>
