<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>理账 Ledger Motion</title>
    <link rel="stylesheet" href="./lizhang-ledger-motion.css">
    <script src="./lizhang-ledger-motion.js" defer></script>
    <style>
      body {
        align-items: center;
        background: #f5f7fb;
        color: #07111f;
        display: grid;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        gap: 24px;
        justify-content: center;
        margin: 0;
        min-height: 100svh;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 32px;
      }
    </style>
  </head>
  <body>
    <h1>理账 Ledger Motion</h1>
    <div class="row">
      <lizhang-ledger-motion motion="idle"></lizhang-ledger-motion>
      <lizhang-ledger-motion motion="pulse"></lizhang-ledger-motion>
      <lizhang-ledger-motion motion="draw"></lizhang-ledger-motion>
    </div>
  </body>
</html>
