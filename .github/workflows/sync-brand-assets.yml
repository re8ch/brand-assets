name: Sync brand assets

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Sync to Cloudflare R2 and Tencent COS
        run: |
          if { [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; } && [ -z "$R2_CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::Missing R2 credentials; add R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY or R2_CLOUDFLARE_API_TOKEN."
            exit 0
          fi

          if [ -z "$COS_SECRET_ID" ] || [ -z "$COS_SECRET_KEY" ]; then
            echo "::warning::Missing COS credentials; skipping brand asset sync."
            exit 0
          fi

          npm run sync:all
        env:
          R2_BUCKET: brand-assets
          R2_ACCOUNT_ID: 6317b796fb47e67fadec3bc9a5ef0e8e
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_CLOUDFLARE_API_TOKEN: ${{ secrets.R2_CLOUDFLARE_API_TOKEN }}
          COS_BUCKET: brandassets-1301339749
          COS_REGION: ap-guangzhou
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          BRAND_ASSETS_GLOBAL_BASE_URL: https://brand-assets.re8ch.com
          BRAND_ASSETS_CHINA_BASE_URL: https://zh-brand-assets.re8ch.com
